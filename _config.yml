locale: "en-US"
site_theme: "mint"
title: "Yile Cai"
title_separator: "-"
name: "Yile Cai"
description: "Personal academic homepage of Yile Cai, an undergraduate student at South China University of Technology interested in visual grounding and multimodal systems."
url: "https://Keria04.github.io"
baseurl: ""
repository: "Keria04/Keria04.github.io"

author:
  avatar: "profile.png"
  name: "Yile Cai"
  bio: "Undergraduate student interested in visual grounding, multimodal systems, and research engineering."
  location: "China"
  email: "yilec5859@gmail.com"
  orcid: "https://orcid.org/0009-0001-1907-0303"
  github: "Keria04"

breadcrumbs: false
words_per_minute: 160
future: false
read_more: "disabled"
talkmap_link: false

comments:
  provider:

collections:
  publications:
    output: true
    permalink: /publications/:path/

atom_feed:
  hide: false
  path:

analytics:
  provider: "false"

include:
  - .htaccess
  - _pages
  - files

exclude:
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - node_modules
  - package.json*
  - vendor
  - tmp

keep_files:
  - .git
  - .svn

encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: false
      read_time: true
      comments: true
      share: true
      related: true
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: false
  - scope:
      path: ""
      type: publications
    values:
      layout: publication
      author_profile: false

sass:
  sass_dir: _sass
  style: compressed

permalink: /:categories/:title/
timezone: Etc/UTC

plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

compress_html:
  clippings: all
  ignore:
    envs: development
