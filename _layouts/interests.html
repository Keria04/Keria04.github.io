---
layout: default
---

{% assign home = site.data.home %}

<div id="main" role="main">
  <article class="page page--wide">
    <div class="page__inner-wrap">
      <header>
        <h1 class="page__title">{{ page.title }}</h1>
      </header>

      <section class="page__content home-section-page" itemprop="text">
        <p class="home-section-page__lead">A compact place for personal interests and learning outside research work.</p>

        <div class="home-grid home-grid--three">
          {% for item in home.interests %}
            <article class="home-card">
              <h3>{{ item.title }}</h3>
              <p>{{ item.text }}</p>
            </article>
          {% endfor %}
        </div>
      </section>
    </div>
  </article>
</div>
